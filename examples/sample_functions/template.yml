AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Sample Lambda functions demonstrating MCP Server tool discovery protocol

Globals:
  Function:
    Timeout: 3
    MemorySize: 128
    Runtime: python3.13
    Architectures:
      - arm64

Resources:
  # Legacy single-tool functions (backward compatibility examples)
  CustomerInfoFromIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: customer-info-from-id/
      Handler: app.lambda_handler
      Description: Retrieve customer status on the CRM system based on { 'customerId' }

  CustomerIdFromEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: customer-id-from-email/
      Handler: app.lambda_handler
      Description: Retrieve customer ID on the CRM system based on { 'email' }

  CustomerCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: customer-create/
      Handler: app.lambda_handler
      Description: Create a new customer on the CRM system based on { 'name', 'email', 'phone', 'address' (optional) }

  # New multi-tool functions with tool discovery protocol
  CustomerManagementFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: customer-management/
      Handler: app.lambda_handler
      Description: Customer management system with multiple tools - supports tool discovery protocol
      Tags:
        MCP: "enabled"
        ToolDiscovery: "v2.1.0"

  SimpleToolsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: simple-tools/
      Handler: app.lambda_handler
      Description: Simple example tools (hello_world, echo, get_timestamp, calculate) - perfect for learning tool discovery protocol
      Tags:
        MCP: "enabled"
        ToolDiscovery: "v2.1.0"
        Example: "basic"

  SimpleToolsMCPFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: simple-tools-mcp/
      Handler: simple_tools_mcp.lambda_handler.lambda_handler
      Description: Dual-mode Lambda/MCP server with simple tools - can run as Lambda or standalone MCP server
      Tags:
        MCP: "enabled"
        ToolDiscovery: "v2.1.0"
        Example: "dual-mode"
        ChukMCPServer: "true"

Outputs:
  # Legacy functions
  CustomerInfoFromIdFunction:
    Description: "Customer Info From ID Lambda Function ARN"
    Value: !GetAtt CustomerInfoFromIdFunction.Arn
  CustomerInfoFromIdFunctionIamRole:
    Description: "Implicit IAM Role created for Customer Info From ID function"
    Value: !GetAtt CustomerInfoFromIdFunctionRole.Arn

  CustomerIdFromEmailFunction:
    Description: "Customer ID From Email Lambda Function ARN"
    Value: !GetAtt CustomerIdFromEmailFunction.Arn
  CustomerIdFromEmailFunctionIamRole:
    Description: "Implicit IAM Role created for Customer ID From Email function"
    Value: !GetAtt CustomerIdFromEmailFunctionRole.Arn

  CustomerCreateFunction:
    Description: "Customer Create Lambda Function ARN"
    Value: !GetAtt CustomerCreateFunction.Arn
  CustomerCreateFunctionIamRole:
    Description: "Implicit IAM Role created for Customer Create function"
    Value: !GetAtt CustomerCreateFunctionRole.Arn

  # New multi-tool functions
  CustomerManagementFunction:
    Description: "Customer Management Lambda Function ARN (with tool discovery)"
    Value: !GetAtt CustomerManagementFunction.Arn
  CustomerManagementFunctionIamRole:
    Description: "Implicit IAM Role created for Customer Management function"
    Value: !GetAtt CustomerManagementFunctionRole.Arn

  SimpleToolsFunction:
    Description: "Simple Tools Lambda Function ARN (with tool discovery - hello_world, echo, get_timestamp, calculate)"
    Value: !GetAtt SimpleToolsFunction.Arn
  SimpleToolsFunctionIamRole:
    Description: "Implicit IAM Role created for Simple Tools function"
    Value: !GetAtt SimpleToolsFunctionRole.Arn

  SimpleToolsMCPFunction:
    Description: "Simple Tools MCP Lambda Function ARN (dual-mode: Lambda + standalone MCP server)"
    Value: !GetAtt SimpleToolsMCPFunction.Arn
  SimpleToolsMCPFunctionIamRole:
    Description: "Implicit IAM Role created for Simple Tools MCP function"
    Value: !GetAtt SimpleToolsMCPFunctionRole.Arn